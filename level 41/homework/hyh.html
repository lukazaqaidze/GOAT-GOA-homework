<!DOCTYPE html>
<html>
<head>
    <title>Div Example</title>
    <style>
        .box1 {
            background-color: rgb(255, 0, 0);
            width: 200px;
            height: 150px;
        }

        .box2 {
            background-color: rgb(0, 255, 0);
            width: 300px;
            height: 100px;
        }

        .box3 {
            background-color: rgb(0, 0, 255);
            width: 150px;
            height: 200px;
        }
    </style>
</head>
<body>

<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>

</body>
</html>
